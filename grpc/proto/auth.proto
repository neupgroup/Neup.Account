syntax = "proto3";

package auth;

service AuthService {
  rpc Verify (VerifyRequest) returns (VerifyResponse);
}

message VerifyRequest {
  string sessionId = 1;
  string sessionKey = 2;
  string accountId = 3;
  string appId = 4;
  string privateKey = 5;
}

message VerifyResponse {
  bool valid = 1;
}
