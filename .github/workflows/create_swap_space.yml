name: Create Permanent Swap

on:
  workflow_dispatch:
    inputs:
      SWAP_MB:
        description: 'Enter permanent swap size in MB'
        required: true
        default: '4096'   # default 4GB

jobs:
  create-swap:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Create Permanent Swap
        run: |
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=10 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
            SWAP_SIZE=${{ github.event.inputs.SWAP_MB }}

            echo "🔄 Turning off any existing swap..."
            sudo swapoff -a

            echo "🗑️ Removing old swap files..."
            sudo rm -f /swapfile /tmp/swapfile /mnt/.bitnami.swap

            echo "💾 Creating permanent \$SWAP_SIZE MB swap..."
            sudo fallocate -l \${SWAP_SIZE}M /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile

            echo "📌 Making swap permanent..."
            grep -qxF '/swapfile none swap sw 0 0' /etc/fstab || echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab

            echo "✅ Swap created successfully:"
            swapon --show
            free -h
          EOF
