name: Deploy Source & Build on Server (Low RAM + Temporary Swap)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Pull your code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Setup SSH Key for server access
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # 3️⃣ Install rsync on runner
      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      # 4️⃣ Upload source code to Lightsail (skip env, node_modules, previous builds)
      - name: Rsync Source Code
        run: |
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.pm2' \
            --exclude '.env' \
            --exclude '.ssh' \
            --exclude 'keys' \
            --exclude '.next' \
            --exclude 'dist' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}

      # 5️⃣ Build and restart on the server with temporary swap
      - name: Build & Restart on Server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ${{ secrets.DEPLOY_PATH }}

            echo "💾 Creating temporary 4GB swap space..."
            sudo fallocate -l 4G /tmp/swapfile
            sudo chmod 600 /tmp/swapfile
            sudo mkswap /tmp/swapfile
            sudo swapon /tmp/swapfile

            echo "📦 Installing fresh dependencies (low RAM optimized)..."
            export NODE_OPTIONS="--max_old_space_size=3072"
            npm ci --production

            echo "🏗️ Building with server-side .env..."
            npm run build

            echo "💥 Removing temporary swap space..."
            sudo swapoff /tmp/swapfile
            sudo rm /tmp/swapfile

            echo "🚀 Restarting app with PM2..."
            pm2 restart all || pm2 start ecosystem.config.js
            pm2 save
          EOF
