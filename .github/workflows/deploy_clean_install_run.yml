name: Deploy Clean Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "YES" to confirm full reinstall'
        required: true
        default: 'NO'

jobs:
  clean-reinstall:
    if: ${{ github.event.inputs.confirm == 'YES' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup SSH Key
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync Code (Skip everything except core codebase)
        run: |
          set -e
          rsync -avz --delete \
            --exclude '.pm2' \
            --exclude '.ssh' \
            --exclude 'keys' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}

      - name: Full Clean & Fresh Install with Environment Check
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "🔍 Checking Node & npm versions..."
            if ! command -v node >/dev/null 2>&1; then
              echo "⚡ Node.js not found. Installing latest LTS..."
              curl -fsSL https://deb.nodesource.com/setup_lts.x | sudo -E bash -
              sudo apt-get install -y nodejs
            else
              echo "✅ Node.js version: \$(node -v)"
              echo "✅ npm version: \$(npm -v)"
            fi

            echo "🔍 Checking PM2 installation..."
            if ! command -v pm2 >/dev/null 2>&1; then
              echo "⚡ PM2 not found. Installing..."
              sudo npm install -g pm2
            else
              echo "✅ PM2 already installed."
            fi

            echo "🧹 Cleaning node_modules, dist, and lock file"
            rm -rf node_modules dist build package-lock.json

            echo "📦 Installing clean dependencies"
            npm install --production

            echo "⚡ Configuring PM2 startup (auto-start on reboot)"
            pm2 startup systemd -u $USER --hp $HOME || true
            pm2 save

            echo "🚀 Restarting app with PM2..."
            pm2 restart all || pm2 start ecosystem.config.js
            pm2 save

            echo "✅ Deployment completed successfully."
          EOF
