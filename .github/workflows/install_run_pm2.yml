name: Install and Run PM2 Instance

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "YES" to confirm full reinstall'
        required: true
        default: 'NO'

jobs:
  deploy:
    if: github.event.inputs.confirm == 'YES'
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy and Manage Node.js App with PM2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            # 🔑 PM2 process name
            APP_NAME="app_001"

            # Install PM2 if not present
            if ! command -v pm2 > /dev/null 2>&1; then
              echo "⚡ PM2 not found. Installing globally..."
              sudo npm install -g pm2
            else
              echo "✅ PM2 already installed."
            fi

            cd ${{ secrets.DEPLOY_PATH }}

            # Create ecosystem.config.js if missing
            if [ ! -f ecosystem.config.js ]; then
              echo "⚡ ecosystem.config.js not found. Creating template..."
              pm2 init
              # Automatically set script to npm start for Node/Next.js
              sed -i 's/script: "app.js"/script: "npm start"/' ecosystem.config.js
            fi

            # Start or restart PM2 process
            if pm2 describe "$APP_NAME" > /dev/null 2>&1; then
              echo "🔄 Restarting existing PM2 process '$APP_NAME'..."
              pm2 restart "$APP_NAME"
            else
              echo "🚀 Starting new PM2 process '$APP_NAME'..."
              pm2 start ecosystem.config.js --name "$APP_NAME"
            fi

            # Save PM2 process list
            pm2 save
          EOF
