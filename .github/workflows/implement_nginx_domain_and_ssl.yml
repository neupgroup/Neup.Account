name: Implement Domain and SSL

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # ----------------------------
            # Variables (EDIT THESE)
            # ----------------------------
            DOMAIN_LIST=("neupgroup.com/account" "www.neupgroup.com/account")
            APP_PORT=4275

            # First domain (without path) is used for config file
            MAIN_DOMAIN=$(echo ${DOMAIN_LIST[0]} | cut -d'/' -f1)

            # Directories
            NGINX_DIR="/etc/nginx"
            AVAILABLE_DIR="$NGINX_DIR/sites-available"
            ENABLED_DIR="$NGINX_DIR/sites-enabled"
            CONFIG_PATH="$AVAILABLE_DIR/$MAIN_DOMAIN"

            echo ">>> Ensuring Nginx directories exist"
            [ -d "$NGINX_DIR" ] || sudo mkdir -p "$NGINX_DIR"
            [ -d "$AVAILABLE_DIR" ] || sudo mkdir -p "$AVAILABLE_DIR"
            [ -d "$ENABLED_DIR" ] || sudo mkdir -p "$ENABLED_DIR"

            # Build server_name list (strip paths, keep only domains)
            SERVER_NAMES=""
            for entry in "${DOMAIN_LIST[@]}"; do
              DOMAIN_ONLY=$(echo $entry | cut -d'/' -f1)
              SERVER_NAMES="$SERVER_NAMES $DOMAIN_ONLY"
            done

            echo ">>> Creating Nginx config for domains: $SERVER_NAMES"

            # Build location blocks dynamically
            LOCATIONS=""
            for entry in "${DOMAIN_LIST[@]}"; do
              DOMAIN_ONLY=$(echo $entry | cut -d'/' -f1)
              PATH_ONLY=$(echo $entry | cut -s -d'/' -f2-)
              if [ -n "$PATH_ONLY" ]; then
                LOCATIONS="$LOCATIONS
                location /$PATH_ONLY/ {
                    proxy_pass http://localhost:$APP_PORT;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host \$host;
                    proxy_cache_bypass \$http_upgrade;
                }"
              else
                LOCATIONS="$LOCATIONS
                location / {
                    proxy_pass http://localhost:$APP_PORT;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host \$host;
                    proxy_cache_bypass \$http_upgrade;
                }"
              fi
            done

            sudo tee $CONFIG_PATH > /dev/null <<EOL
            server {
                listen 80;
                server_name $SERVER_NAMES;
                $LOCATIONS
            }
            EOL

            echo ">>> Linking config"
            sudo ln -sf $CONFIG_PATH $ENABLED_DIR/$MAIN_DOMAIN

            echo ">>> Testing + Reloading Nginx"
            sudo nginx -t && sudo systemctl reload nginx

            echo ">>> Installing Certbot + SSL"
            sudo apt update -y
            sudo apt install certbot python3-certbot-nginx -y

            CERT_DOMAINS=""
            for entry in "${DOMAIN_LIST[@]}"; do
              DOMAIN_ONLY=$(echo $entry | cut -d'/' -f1)
              CERT_DOMAINS="$CERT_DOMAINS -d $DOMAIN_ONLY"
            done

            sudo certbot --nginx $CERT_DOMAINS --non-interactive --agree-tos -m admin@$MAIN_DOMAIN --redirect

            echo ">>> Deployment finished for $MAIN_DOMAIN 🚀"
